name = "rss-bot"
main = "src/worker.js"
compatibility_date = "2024-07-01"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "rss-bot-db"
database_id = "数据库id"

# 非敏感环境变量（可公开）
[vars]
HUB_URL = "https://hub.openilink.com" # ilink地址
BOT_ID = ""

# 敏感信息（DEEPSEEK_API_KEY、APP_TOKEN、WEBHOOK_SECRET）不要写在这里！
# 请使用 Cloudflare Secrets 存储，不会被提交到仓库：
#   wrangler secret put DEEPSEEK_API_KEY
#   wrangler secret put APP_TOKEN
#   wrangler secret put WEBHOOK_SECRET
# 本地开发时放入 .dev.vars（已在 .gitignore 中忽略），参考 .dev.vars.example

# 放置地区环境变量
[placement]
region = "azure:japaneast"

# 自定义域名
routes = [
  { pattern = "自定义域名", custom_domain = true }
]

# Cron 定时任务
triggers = { crons = ["*/30 * * * *"] }

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1